# Server
server.port=1234

# Service Name (IMPORTANT)
spring.application.name=summarizer-api-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/asyncsummarizer
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

kafka.topic=summarization-jobs

# Logging (NEW)
logging.file.name=logs/summarizer-api-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger - ${spring.application.name} - %msg%n